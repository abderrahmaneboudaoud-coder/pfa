services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    depends_on:
      - redis
    env_file:
      - .env

  worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info
    volumes:
      - ./app:/app
    depends_on:
      - redis

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./fe:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - API_TARGET=http://api:8000
    depends_on:
      - api

  mongo:
    image: mongo
    ports:
      - "27017:27017"